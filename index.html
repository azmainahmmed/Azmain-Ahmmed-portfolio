<!-- Contact Section (Professional) -->
<section id="contact" class="py-20 px-6 bg-yellow-50 w-full">
  <div class="max-w-5xl mx-auto text-center">
    <h2 class="text-4xl font-bold text-gray-900 mb-12">Send Me a Message</h2>

    <div class="grid md:grid-cols-2 gap-12">
      
      <!-- Contact Info Cards -->
      <div class="space-y-6">
        <div class="bg-white rounded-2xl shadow-lg p-6 flex flex-col items-center">
          <img src="https://i.postimg.cc/Jn5xPV7M/email-icon.png" class="w-12 h-12 mb-4" alt="Email">
          <h3 class="font-semibold text-lg mb-1">Email</h3>
          <p class="text-yellow-600">azmainahmmed056@gmail.com</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 flex flex-col items-center">
          <img src="https://i.postimg.cc/3xQbDrwQ/phone-icon.png" class="w-12 h-12 mb-4" alt="Phone">
          <h3 class="font-semibold text-lg mb-1">Phone</h3>
          <p class="text-yellow-600">+880 1794 272 577</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 flex flex-col items-center">
          <img src="https://i.postimg.cc/0NBGZ0Z0/location-icon.png" class="w-12 h-12 mb-4" alt="Location">
          <h3 class="font-semibold text-lg mb-1">Location</h3>
          <p class="text-yellow-600">Mymensingh, Bangladesh</p>
        </div>
      </div>

      <!-- Contact Form -->
      <form action="https://formspree.io/f/xnjoqgdg" method="POST" class="bg-white p-10 rounded-3xl shadow-xl space-y-6">
        <input type="text" name="name" placeholder="Your Name" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-yellow-400 focus:outline-none">
        <input type="email" name="_replyto" placeholder="Your Email" required class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:ring-yellow-400 focus:outline-none">
        <textarea name="message" placeholder="Your Message" required class="w-full border border-gray-300 rounded-lg px-4 py-3 h-36 focus:ring-yellow-400 focus:outline-none"></textarea>
        <button type="submit" class="w-full bg-gradient-to-r from-yellow-400 to-yellow-600 text-white font-semibold py-3 rounded-xl hover:scale-105 transition-transform duration-300">Send Message</button>
      </form>

    </div>
  </div>
</section>
