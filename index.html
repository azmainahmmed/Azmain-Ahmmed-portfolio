<!-- Contact Section -->
<section id="contact" class="py-20 px-6 bg-gradient-to-br from-yellow-100 via-amber-100 to-yellow-50 w-full">
  <div class="max-w-4xl mx-auto">
    <h2 class="section-title text-4xl md:text-5xl font-bold text-gray-900 mb-16 fade-in text-center">Contact Me</h2>

    <div class="grid md:grid-cols-2 gap-8">
      <!-- Contact Details -->
      <div class="bg-white p-8 rounded-2xl shadow-lg fade-in hover:shadow-xl transition-shadow">
        <div class="text-5xl mb-4">📧</div>
        <h3 class="font-bold text-gray-900 mb-2">Email</h3>
        <a href="mailto:azmainahmmed056@gmail.com" class="text-yellow-600 hover:text-yellow-700 break-all font-semibold">azmainahmmed056@gmail.com</a>

        <div class="mt-6 text-center">
          <div class="text-5xl mb-4">📱</div>
          <h3 class="font-bold text-gray-900 mb-2">Phone</h3>
          <a href="tel:+8801794272577" class="text-yellow-600 hover:text-yellow-700 font-semibold">+880 1794 272 577</a>
        </div>

        <div class="mt-6 text-center">
          <div class="text-5xl mb-4">📍</div>
          <h3 class="font-bold text-gray-900 mb-2">Location</h3>
          <p class="text-yellow-600 font-semibold">Mymensingh, Bangladesh</p>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="bg-white p-8 rounded-2xl shadow-lg fade-in hover:shadow-xl transition-shadow">
        <form action="https://formspree.io/f/xnjoqgdg" method="POST" class="space-y-6">
          <div>
            <label for="name" class="block mb-2 font-semibold text-gray-900">Your Name</label>
            <input type="text" name="name" id="name" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-yellow-400 focus:outline-none">
          </div>
          <div>
            <label for="email" class="block mb-2 font-semibold text-gray-900">Your Email</label>
            <input type="email" name="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-yellow-400 focus:outline-none">
          </div>
          <div>
            <label for="message" class="block mb-2 font-semibold text-gray-900">Message</label>
            <textarea name="message" id="message" rows="5" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-yellow-400 focus:outline-none"></textarea>
          </div>
          <div class="text-center">
            <button type="submit" class="btn-primary px-8 py-4 rounded-full font-semibold text-lg">Send Message</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
